name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Import smoke test
        run: |
          python -c "import coinfox, coinfox.model, coinfox.indicators, coinfox.dashboard, coinfox.intel, coinfox.trade; print('ok', coinfox.__version__)"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Regime benchmark smoke
        run: python -m coinfox pulse status --benchmark --symbols 25 --updates 120 --window-size 80
      - name: Replay quality gate smoke
        run: python -m coinfox pulse replay --synthetic --horizon-steps 3 --min-sample-size 30 --min-hit-rate 0.80 --max-brier 0.25
