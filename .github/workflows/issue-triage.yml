name: issue-triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label by keywords
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title}\n${issue.body || ''}`.toLowerCase();
            const labels = new Set();

            if (/bug|error|fail|crash|exception|traceback/.test(text)) labels.add('bug');
            if (/feature|enhancement|improve|proposal/.test(text)) labels.add('enhancement');
            if (/docs|readme|documentation|typo/.test(text)) labels.add('documentation');
            if (/good first issue|beginner|easy/.test(text)) labels.add('good first issue');
            if (/provider|ollama|groq|gemini|openrouter|api key/.test(text)) labels.add('ai-provider');

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [...labels],
              });
            }
