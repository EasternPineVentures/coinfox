name: 🐛 Bug report
description: Something's broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: coinfox version / commit
  - type: input
    id: python
    attributes:
      label: Python version & OS
