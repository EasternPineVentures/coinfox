name: Feature request
description: Propose a product, API, CLI, mobile, or community improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should CoinFox help users understand?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and the expected user-facing behavior.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - API
        - Mobile
        - Model/Bias
        - Data Source
        - Community/Governance
        - Docs
    validations:
      required: true
